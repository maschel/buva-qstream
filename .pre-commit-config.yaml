repos:
  - repo: local
    hooks:
      - id: black
        name: Format with Black
        entry: poetry run black
        language: system
        types: [python]
      - id: flake8
        name: Lint with Flake8
        entry: poetry run flake8
        language: system
        types: [python]
      - id: mypy
        name: Type check with MyPy
        entry: poetry run mypy
        language: system
        types: [python]