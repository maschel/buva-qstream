repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2  # Use the latest stable version
    hooks:
      - id: black
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0  # Use the latest stable version
    hooks:
      - id: flake8
        language: system
        entry: poetry run flake8
        types: [python]